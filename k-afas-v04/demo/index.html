<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K-AFAS v0.4.1 검토 콘솔</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: -apple-system, 'Pretendard', sans-serif; background: #0f172a; color: #e2e8f0; }

/* ── 헤더 ── */
.header { display:flex; align-items:center; justify-content:space-between; padding:8px 16px; background:#1e293b; border-bottom:1px solid #334155; height:48px; }
.title { font-size:16px; font-weight:700; color:#f1f5f9; }
.status { display:flex; align-items:center; gap:8px; font-size:12px; color:#94a3b8; }
.dot { width:8px; height:8px; border-radius:50%; background:#22c55e; animation:pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.badge { padding:2px 8px; background:#334155; border-radius:4px; font-weight:600; }
.timer { font-size:10px; }

/* ── 메인 그리드: 좌 지도(60%) + 우 패널(40%) ── */
.main { display:grid; grid-template-columns:60fr 40fr; height:calc(100vh - 48px); gap:2px; }

/* ── 좌측 지도 패널 ── */
.left-panel { display:flex; flex-direction:column; background:#0a1628; overflow:hidden; border:1px solid #334155; border-radius:4px; }
.map-header { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:#0f172a; border-bottom:1px solid #334155; font-size:12px; font-weight:600; color:#cbd5e1; }
.layers { display:flex; flex-wrap:wrap; gap:3px; padding:4px 8px; border-bottom:1px solid #1e293b; }
.chip { padding:2px 7px; border-radius:12px; font-size:9px; cursor:pointer; border:1px solid #475569; transition:all 0.15s; user-select:none; }
.chip.on { background:#3b82f6; border-color:#3b82f6; color:#fff; }
.chip.off { background:transparent; color:#64748b; }
.map-area { flex:1; position:relative; overflow:hidden; }
.map-grid-bg { position:absolute; inset:0; opacity:0.12; }
.marker { position:absolute; width:14px; height:14px; border-radius:50%; border:2px solid #fff; cursor:pointer; transition:transform 0.2s, box-shadow 0.2s; z-index:2; }
.marker:hover { transform:scale(1.5); }
.marker.selected { box-shadow:0 0 0 4px rgba(59,130,246,0.5); transform:scale(1.4); }
.marker.pass { background:#22c55e; }
.marker.hold { background:#eab308; }
.marker.reject { background:#ef4444; }
.marker-label { position:absolute; top:-16px; left:50%; transform:translateX(-50%); font-size:8px; white-space:nowrap; color:#fff; text-shadow:0 1px 2px #000; pointer-events:none; }
.coord-bar { padding:5px 12px; background:#0f172a; border-top:1px solid #334155; display:flex; align-items:center; gap:10px; font-size:11px; }
.tgt-list { display:flex; gap:3px; padding:4px 8px; border-top:1px solid #1e293b; background:#0f172a; }
.tgt-btn { padding:2px 7px; border-radius:4px; border:none; font-size:9px; cursor:pointer; }
.tgt-btn.active { background:#3b82f6; color:#fff; }
.tgt-btn.inactive { background:#334155; color:#94a3b8; }

/* ── 우측 패널 (스크롤) ── */
.right-panel { display:flex; flex-direction:column; gap:2px; overflow-y:auto; }
.panel { background:#1e293b; border:1px solid #334155; border-radius:4px; overflow:hidden; display:flex; flex-direction:column; }
.ph { display:flex; align-items:center; justify-content:space-between; padding:6px 12px; background:#0f172a; border-bottom:1px solid #334155; font-size:12px; font-weight:600; color:#cbd5e1; flex-shrink:0; }
.pb { padding:8px; }

/* ── 메트릭 패널 ── */
.metrics-panel { display:flex; flex-direction:column; gap:10px; padding:12px; background:rgba(15,23,42,0.92); border:1px solid rgba(148,163,184,0.18); border-radius:10px; }
.metrics-header { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; }
.metrics-header h3 { margin:0; font-size:13px; font-weight:700; }
.metrics-header p { margin:3px 0 0; color:#94a3b8; font-size:11px; }
.scenario-badge { padding:4px 8px; border-radius:999px; font-size:10px; font-weight:700; border:1px solid rgba(255,255,255,0.12); }
.scenario-clean { color:#22c55e; background:rgba(34,197,94,0.1); }
.scenario-degraded { color:#eab308; background:rgba(234,179,8,0.1); }
.scenario-contested { color:#ef4444; background:rgba(239,68,68,0.1); }
.metrics-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
.metric-card { padding:8px; border-radius:8px; background:rgba(30,41,59,0.75); border:1px solid rgba(148,163,184,0.12); }
.metric-card.primary { background:rgba(14,165,233,0.12); border-color:rgba(14,165,233,0.28); }
.metric-label { display:block; color:#94a3b8; font-size:10px; }
.metric-card strong { display:block; margin-top:3px; font-size:18px; line-height:1.1; }
.metric-card small { display:block; margin-top:3px; color:#64748b; font-size:9px; }
.chart-block { padding:8px; border-radius:8px; background:rgba(2,6,23,0.42); border:1px solid rgba(148,163,184,0.1); }
.chart-title { margin-bottom:6px; color:#cbd5e1; font-size:11px; font-weight:700; }
.success-bars { display:flex; flex-direction:column; gap:6px; }
.bar-row { display:flex; align-items:center; gap:6px; font-size:10px; }
.bar-label { width:90px; color:#94a3b8; text-align:right; }
.bar-track { flex:1; height:14px; background:rgba(15,23,42,0.9); border-radius:999px; overflow:hidden; }
.bar-fill { height:100%; border-radius:999px; transition:width 0.5s; }
.bar-val { width:40px; font-weight:600; }
.stage-stack { display:flex; width:100%; height:24px; overflow:hidden; border-radius:999px; background:rgba(15,23,42,0.9); border:1px solid rgba(148,163,184,0.16); }
.stage-seg { display:flex; align-items:center; justify-content:center; min-width:20px; color:#0f172a; font-size:8px; font-weight:800; white-space:nowrap; }
.stage-SENSOR { background:#38bdf8; }
.stage-AI { background:#a78bfa; }
.stage-TRACK { background:#34d399; }
.stage-REVIEW_PACKAGE { background:#fbbf24; }
.stage-HITL { background:#fb7185; }
.stage-LINK { background:#94a3b8; }
.stage-legend { display:grid; grid-template-columns:repeat(2,1fr); gap:4px 8px; margin-top:8px; }
.legend-item { display:flex; align-items:center; gap:4px; color:#94a3b8; font-size:10px; }
.legend-item strong { margin-left:auto; color:#e5e7eb; }
.legend-dot { width:7px; height:7px; border-radius:999px; flex:0 0 auto; }
.safety-note { padding:6px 8px; border-radius:8px; background:rgba(15,23,42,0.65); color:#94a3b8; font-size:10px; line-height:1.4; border:1px dashed rgba(148,163,184,0.22); }

/* ── 증거 카드 ── */
.evi-card { display:flex; align-items:center; gap:8px; background:#0f172a; border:1px solid #334155; border-radius:6px; padding:6px 8px; margin-bottom:4px; }
.evi-icon { font-size:16px; }
.evi-info { flex:1; }
.evi-title { font-size:11px; font-weight:600; }
.evi-meta { font-size:9px; color:#94a3b8; }
.freshness-dot { width:7px; height:7px; border-radius:50%; }

/* ── 의사결정 버튼 ── */
.btn { padding:6px 10px; border:none; border-radius:4px; font-size:11px; font-weight:600; cursor:pointer; width:100%; transition:opacity 0.15s; }
.btn:hover { opacity:0.85; }
.btn:disabled { opacity:0.4; cursor:not-allowed; }
.btn-approve { background:#22c55e; color:#052e16; }
.btn-hold { background:#eab308; color:#422006; }
.btn-reject { background:#ef4444; color:#fff; }
.btn-more { background:#3b82f6; color:#fff; }

/* 스크롤바 */
::-webkit-scrollbar { width:4px; }
::-webkit-scrollbar-track { background:#1e293b; }
::-webkit-scrollbar-thumb { background:#475569; border-radius:2px; }
</style>
</head>
<body>

<header class="header">
  <h1 class="title">K-AFAS v0.4.1 검토 콘솔</h1>
  <div class="status">
    <span class="dot"></span><span>실시간 연결</span>
    <span class="badge">대기 <span id="caseCount">5</span>건</span>
    <span class="timer" id="lockTimer">잠금 4:59</span>
  </div>
</header>

<main class="main">
  <!-- 좌측: 지도 패널 -->
  <section class="left-panel">
    <div class="map-header"><span>지도/지형 패널 (3D)</span><span style="font-size:10px;color:#64748b">DISPLAY_ONLY · CesiumJS</span></div>
    <div class="layers" id="layerBar"></div>
    <div class="map-area" id="mapArea">
      <svg class="map-grid-bg" width="100%" height="100%"><defs><pattern id="g" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M 40 0 L 0 0 0 40" fill="none" stroke="#334155" stroke-width="0.5"/></pattern></defs><rect width="100%" height="100%" fill="url(#g)"/></svg>
    </div>
    <div class="coord-bar"><span style="font-weight:700" id="selId">TGT-001</span><span style="font-weight:600" id="selGate">PASS</span><span id="selCiv">민간:LOW</span><span id="selFri">아군:LOW</span><span style="color:#64748b">DISPLAY_ONLY</span></div>
    <div class="tgt-list" id="tgtList"></div>
  </section>

  <!-- 우측: 3단 패널 -->
  <div class="right-panel">
    <!-- 메트릭 패널 -->
    <section class="panel">
      <div class="ph"><span>시뮬레이션 지표</span><span id="scenarioBadge" class="scenario-badge scenario-clean">정상망(Clean)</span></div>
      <div class="pb" id="metricsBody"></div>
    </section>
    <!-- 증거 패널 -->
    <section class="panel">
      <div class="ph"><span>증거 검토</span><span style="font-size:10px;color:#64748b" id="eviCount">3건</span></div>
      <div class="pb" id="eviBody"></div>
    </section>
    <!-- 의사결정 패널 -->
    <section class="panel">
      <div class="ph"><span>의사결정 지원</span><span style="font-size:10px;color:#64748b" id="decStatus"></span></div>
      <div class="pb" id="decBody"></div>
    </section>
  </div>
</main>

<script>
// ── 데이터 ──
const CASES=[
  {id:"TGT-001",gate:"PASS",civ:"LOW",fri:"LOW",ttrr:12.4,rec:"REVIEW_REQUIRED",status:"HALTED@awaiting_human_review",x:55,y:30,scenario:"CLEAN"},
  {id:"TGT-002",gate:"HOLD",civ:"MEDIUM",fri:"LOW",ttrr:28.7,rec:"HOLD",status:"HALTED@awaiting_human_review",x:40,y:45,scenario:"DEGRADED"},
  {id:"TGT-003",gate:"REJECT",civ:"HIGH",fri:"MEDIUM",ttrr:5.1,rec:"REJECT",status:"REJECTED",x:70,y:55,scenario:"CONTESTED"},
  {id:"TGT-004",gate:"PASS",civ:"LOW",fri:"LOW",ttrr:15.2,rec:"REVIEW_REQUIRED",status:"HALTED@awaiting_human_review",x:80,y:35,scenario:"CLEAN"},
  {id:"TGT-005",gate:"HOLD",civ:"MEDIUM",fri:"MEDIUM",ttrr:42.8,rec:"HOLD",status:"HALTED@awaiting_human_review",x:30,y:70,scenario:"DEGRADED"},
];

const EVIDENCE={
  "TGT-001":[{icon:"📹",src:"RQ-101 UAV",type:"uav_video",time:"14:32",fresh:"#009E73",conf:85},{icon:"📡",src:"전자전대대",type:"sigint",time:"14:28",fresh:"#009E73",conf:72},{icon:"👤",src:"GOP 관측소",type:"humint",time:"14:15",fresh:"#F0E442",conf:60}],
  "TGT-002":[{icon:"🛰️",src:"정찰위성",type:"satellite",time:"13:45",fresh:"#F0E442",conf:68}],
  "TGT-003":[{icon:"📹",src:"KUS-FS UAV",type:"uav_video",time:"12:10",fresh:"#D55E00",conf:45}],
  "TGT-004":[{icon:"📡",src:"합참 신호정보",type:"sigint",time:"14:40",fresh:"#009E73",conf:90},{icon:"📹",src:"소형 UAV",type:"uav_video",time:"14:38",fresh:"#009E73",conf:82}],
  "TGT-005":[{icon:"👤",src:"첩보원 보고",type:"humint",time:"11:30",fresh:"#D55E00",conf:40}],
};

const SCENARIOS={
  CLEAN:{label:"정상망(Clean)",cls:"scenario-clean",mean:14.2,median:12.8,success:96.2},
  DEGRADED:{label:"저하망(Degraded)",cls:"scenario-degraded",mean:32.5,median:28.1,success:78.4},
  CONTESTED:{label:"경합망(Contested)",cls:"scenario-contested",mean:58.9,median:52.3,success:54.1},
};

const STAGES=[
  {stage:"SENSOR",mean:2.1,color:"#38bdf8"},
  {stage:"AI",mean:3.4,color:"#a78bfa"},
  {stage:"TRACK",mean:1.8,color:"#34d399"},
  {stage:"REVIEW_PACKAGE",mean:4.2,color:"#fbbf24"},
  {stage:"HITL",mean:8.5,color:"#fb7185"},
  {stage:"LINK",mean:1.2,color:"#94a3b8"},
];
const STAGE_LABELS={SENSOR:"센서",AI:"AI분석",TRACK:"트랙품질",REVIEW_PACKAGE:"검토패키지",HITL:"인간검토",LINK:"연동상태"};

const LAYERS=["지형","교통망","수계","민간거주","제한구역","아군위치","충돌영역","적위험도","표적후보","증거마커","신선도","좌표품질","게이트결과","검토대기열","감사추적"];
const LAYER_ON=[1,1,0,1,1,1,1,1,1,0,1,1,1,1,0];

let selected=CASES[0];
let layerState=[...LAYER_ON];

// ── 렌더 ──
function renderLayers(){
  document.getElementById("layerBar").innerHTML=LAYERS.map((l,i)=>`<span class="chip ${layerState[i]?'on':'off'}" onclick="layerState[${i}]=!layerState[${i}];renderLayers()">${l}</span>`).join("");
}

function renderMarkers(){
  const a=document.getElementById("mapArea");
  a.querySelectorAll(".marker").forEach(m=>m.remove());
  CASES.forEach(c=>{
    const m=document.createElement("div");
    m.className=`marker ${c.gate.toLowerCase()} ${c.id===selected.id?'selected':''}`;
    m.style.left=c.x+"%"; m.style.top=c.y+"%";
    m.innerHTML=`<span class="marker-label">${c.id}</span>`;
    m.onclick=()=>selectCase(c);
    a.appendChild(m);
  });
}

function renderTgtList(){
  document.getElementById("tgtList").innerHTML=CASES.map((c,i)=>`<button class="tgt-btn ${c.id===selected.id?'active':'inactive'}" onclick="selectCase(CASES[${i}])">${c.id}</button>`).join("");
}

function selectCase(c){ selected=c; renderAll(); }

function renderCoordBar(){
  document.getElementById("selId").textContent=selected.id;
  const g=document.getElementById("selGate");
  g.textContent=selected.gate;
  g.style.color=selected.gate==="PASS"?"#22c55e":selected.gate==="HOLD"?"#eab308":"#ef4444";
  document.getElementById("selCiv").textContent="민간:"+selected.civ;
  document.getElementById("selFri").textContent="아군:"+selected.fri;
}

function renderMetrics(){
  const sc=SCENARIOS[selected.scenario];
  const badge=document.getElementById("scenarioBadge");
  badge.textContent=sc.label;
  badge.className="scenario-badge "+sc.cls;

  const stageTotal=STAGES.reduce((s,st)=>s+st.mean,0);
  const ttsr=selected.ttrr;

  let html=`
    <div class="metrics-grid">
      <div class="metric-card primary"><span class="metric-label">TTSR</span><strong>${ttsr.toFixed(1)}s</strong><small>첩보→검토준비</small></div>
      <div class="metric-card"><span class="metric-label">성공률</span><strong>${sc.success}%</strong><small>${sc.label} 기준</small></div>
      <div class="metric-card"><span class="metric-label">평균지연</span><strong>${sc.mean.toFixed(1)}s</strong><small>검토흐름 평균</small></div>
    </div>
    <div class="chart-block" style="margin-top:8px">
      <div class="chart-title">시나리오별 성공률</div>
      <div class="success-bars">`;
  Object.entries(SCENARIOS).forEach(([k,v])=>{
    const barColor=k==="CLEAN"?"#22c55e":k==="DEGRADED"?"#eab308":"#ef4444";
    html+=`<div class="bar-row"><span class="bar-label">${v.label}</span><div class="bar-track"><div class="bar-fill" style="width:${v.success}%;background:${barColor}"></div></div><span class="bar-val" style="color:${barColor}">${v.success}%</span></div>`;
  });
  html+=`</div></div>
    <div class="chart-block" style="margin-top:8px">
      <div class="chart-title">검토흐름 단계별 지연</div>
      <div class="stage-stack">`;
  STAGES.forEach(st=>{
    const w=Math.max((st.mean/stageTotal)*100,5);
    html+=`<div class="stage-seg stage-${st.stage}" style="width:${w}%" title="${STAGE_LABELS[st.stage]} ${st.mean}s">${st.stage.slice(0,3)}</div>`;
  });
  html+=`</div><div class="stage-legend">`;
  STAGES.forEach(st=>{
    html+=`<div class="legend-item"><span class="legend-dot" style="background:${st.color}"></span><span>${STAGE_LABELS[st.stage]}</span><strong>${st.mean.toFixed(1)}s</strong></div>`;
  });
  html+=`</div></div>
    <div class="safety-note" style="margin-top:8px">표시전용(DISPLAY_ONLY): 자동사격·사격제원·탄도계산 수행 없음. 인간검토(HITL) 필수.</div>`;
  document.getElementById("metricsBody").innerHTML=html;
}

function renderEvidence(){
  const evis=EVIDENCE[selected.id]||[];
  document.getElementById("eviCount").textContent=evis.length+"건";
  document.getElementById("eviBody").innerHTML=evis.map(e=>`<div class="evi-card"><span class="evi-icon">${e.icon}</span><div class="evi-info"><div class="evi-title">${e.src}</div><div class="evi-meta">${e.type} · ${e.time} KST · 신뢰도 ${e.conf}%</div></div><span class="freshness-dot" style="background:${e.fresh}"></span></div>`).join("");
}

function renderDecision(){
  document.getElementById("decStatus").textContent=selected.id+" · "+selected.status;
  const dis=selected.status==="REJECTED";
  document.getElementById("decBody").innerHTML=`
    <div style="display:flex;justify-content:space-between;font-size:10px;margin-bottom:6px"><span>게이트: <b style="color:${selected.gate==='PASS'?'#22c55e':selected.gate==='HOLD'?'#eab308':'#ef4444'}">${selected.gate}</b></span><span>추천: <b>${selected.rec}</b></span></div>
    <textarea placeholder="결정 사유 입력 (필수)..." style="width:100%;height:32px;resize:none;background:#0f172a;border:1px solid #334155;border-radius:4px;padding:5px 7px;color:#e2e8f0;font-size:10px;margin-bottom:6px"></textarea>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:5px">
      <button class="btn btn-more" onclick="doAction('추가증거요청')">추가증거요청</button>
      <button class="btn btn-hold" onclick="doAction('보류')">보류</button>
      <button class="btn btn-reject" ${dis?'disabled':''} onclick="doAction('거부')">거부</button>
      <button class="btn btn-approve" ${dis?'disabled':''} onclick="doAction('다음검토 승인')">다음검토 승인</button>
    </div>
    <div style="margin-top:6px;font-size:9px;color:#475569;border-top:1px solid #1e293b;padding-top:5px">⚠ 의사결정 <b>지원</b>만 제공. 최종 결정은 인가된 인간 지휘관 권한.</div>`;
}

function doAction(a){
  const ta=document.querySelector("#decBody textarea");
  if(!ta||!ta.value.trim()){alert("결정 사유를 입력하세요.");return;}
  alert(`[${selected.id}] ${a} 완료\n사유: ${ta.value}`);
  ta.value="";
}

function renderAll(){
  renderMarkers(); renderTgtList(); renderCoordBar();
  renderMetrics(); renderEvidence(); renderDecision();
}

// ── 잠금 타이머 ──
let lockSec=299;
setInterval(()=>{
  lockSec=Math.max(0,lockSec-1);
  const el=document.getElementById("lockTimer");
  el.textContent=`잠금 ${Math.floor(lockSec/60)}:${String(lockSec%60).padStart(2,"0")}`;
  el.style.color=lockSec<60?"#ef4444":"#64748b";
},1000);
document.addEventListener("mousemove",()=>{lockSec=299;});
document.addEventListener("keydown",()=>{lockSec=299;});

// 클립보드 차단
document.addEventListener("copy",e=>{e.preventDefault();});

// 초기화
renderLayers(); renderAll();
</script>
</body>
</html>
